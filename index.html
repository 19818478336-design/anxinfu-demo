<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安心付 · 预付消费商户风险查询</title>
<style>
  :root {
    --green: #27AE60; --green-bg: #E8F8F0;
    --yellow: #F39C12; --yellow-bg: #FFF8E8;
    --red: #E74C3C; --red-bg: #FDEDEC;
    --blue: #2980B9; --blue-dark: #1a5276;
    --text: #2C3E50; --text-light: #5D6D7E;
    --grey: #95A5A6; --border: #E8ECF1;
    --shadow: 0 4px 24px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.10);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #F7F8FA; color: var(--text); line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Top bar ── */
  .topbar {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between;
  }
  .topbar .brand { display: flex; align-items: center; gap: 10px; }
  .topbar .brand .icon {
    width: 34px; height: 34px; background: linear-gradient(135deg, #27AE60, #1ABC9C);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 17px; font-weight: 700;
  }
  .topbar .brand .name { font-size: 18px; font-weight: 700; color: #1a3a4a; letter-spacing: 1px; }
  .topbar .demo-tag {
    font-size: 11px; color: var(--grey); background: #F5F7FA;
    padding: 4px 12px; border-radius: 12px; letter-spacing: 1px;
  }

  /* ── Hero ── */
  .hero {
    background: linear-gradient(170deg, #f0f4f8 0%, #e8edf2 40%, #f7f8fa 100%);
    padding: 60px 32px 48px; text-align: center;
  }
  .hero h1 {
    font-size: 36px; font-weight: 800; color: #1a3a4a; letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .hero h1 em {
    font-style: normal; background: linear-gradient(135deg, #27AE60, #2980B9);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero .tagline { font-size: 16px; color: var(--text-light); max-width: 480px; margin: 0 auto 36px; }

  /* ── Search ── */
  .search-wrap {
    max-width: 560px; margin: 0 auto;
  }
  .search-row {
    display: flex; background: #fff; border-radius: 14px;
    box-shadow: var(--shadow-lg); overflow: hidden;
  }
  .search-row input {
    flex: 1; padding: 16px 22px; font-size: 16px;
    border: 2px solid transparent; border-radius: 14px 0 0 14px;
    outline: none; transition: border-color 0.2s;
  }
  .search-row input:focus { border-color: var(--blue); }
  .search-row input::placeholder { color: #BDC3C7; }
  .search-row button {
    padding: 16px 36px; font-size: 15px; font-weight: 700; letter-spacing: 1px;
    background: var(--blue); color: #fff; border: none; cursor: pointer;
    transition: background 0.2s; white-space: nowrap;
  }
  .search-row button:hover { background: #1c6ea4; }
  .search-hint {
    font-size: 12px; color: #BDC3C7; margin-top: 10px;
  }
  .search-hint span { cursor: pointer; color: var(--blue); border-bottom: 1px dotted var(--blue); }
  .search-hint span:hover { color: #1c6ea4; }
  .search-hint span + span { margin-left: 14px; }

  /* ── Stats strip ── */
  .stats-strip {
    max-width: 800px; margin: 0 auto; padding: 48px 32px 20px;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
  }
  .stat-card {
    background: #fff; border-radius: 12px; padding: 22px 20px; text-align: center;
    box-shadow: var(--shadow); transition: transform 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-card .num {
    font-size: 32px; font-weight: 800; letter-spacing: -1px;
    background: linear-gradient(135deg, #E74C3C, #F39C12);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-card .num.safe {
    background: linear-gradient(135deg, #27AE60, #2980B9);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-card .label { font-size: 13px; color: var(--text-light); margin-top: 4px; }
  .stat-card .src { font-size: 11px; color: #BDC3C7; margin-top: 6px; }

  /* ── Result area ── */
  .result-area { max-width: 800px; margin: 0 auto; padding: 0 32px 60px; }
  .result-card {
    background: #fff; border-radius: 16px; box-shadow: var(--shadow-lg);
    overflow: hidden; display: none;
  }
  .result-card.show { display: block; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Score hero ── */
  .score-hero {
    padding: 40px 36px 32px; text-align: center; position: relative;
  }
  .score-hero.green  { background: linear-gradient(180deg, #E8F8F0 0%, #F4FBF7 50%, #fff 100%); }
  .score-hero.yellow { background: linear-gradient(180deg, #FFF8E8 0%, #FFFCF4 50%, #fff 100%); }
  .score-hero.red    { background: linear-gradient(180deg, #FDEDEC 0%, #FEF5F5 50%, #fff 100%); }

  .score-ring {
    width: 150px; height: 150px; margin: 0 auto 18px; position: relative;
  }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .bg { fill: none; stroke: #EEF0F2; stroke-width: 10; }
  .score-ring .fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
  .score-ring .inner {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-ring .big { font-size: 52px; font-weight: 800; line-height: 1; letter-spacing: -2px; }
  .score-ring .sub { font-size: 13px; color: var(--grey); margin-top: 2px; }

  .grade-badge {
    display: inline-block; padding: 6px 22px; border-radius: 20px;
    font-size: 14px; font-weight: 700;
  }
  .grade-badge.green  { background: var(--green-bg); color: var(--green); }
  .grade-badge.yellow { background: var(--yellow-bg); color: #c17e0a; }
  .grade-badge.red    { background: var(--red-bg); color: var(--red); }

  .verdict { font-size: 17px; font-weight: 700; margin: 10px 0 6px; }
  .advice  { font-size: 13px; color: var(--text-light); max-width: 460px; margin: 0 auto; }

  /* ── Quick glance row ── */
  .glance {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
    background: var(--border); border-top: 1px solid var(--border);
  }
  .glance-item {
    background: #fff; padding: 18px 20px; text-align: center;
  }
  .glance-item .g-label { font-size: 12px; color: var(--grey); margin-bottom: 4px; }
  .glance-item .g-value { font-size: 16px; font-weight: 700; }

  /* ── Section ── */
  .section { padding: 28px 36px; border-top: 1px solid var(--border); }
  .section h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }

  /* Dimensions */
  .dim-item { margin-bottom: 16px; }
  .dim-item:last-child { margin-bottom: 0; }
  .dim-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
  .dim-head .dim-title { font-size: 14px; font-weight: 600; }
  .dim-head .dim-meta { font-size: 12px; color: var(--grey); }
  .dim-track {
    height: 10px; background: #EEF0F2; border-radius: 5px; overflow: hidden; position: relative;
  }
  .dim-fill {
    height: 100%; border-radius: 5px; transition: width 0.9s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .dim-fill.green  { background: linear-gradient(90deg, #27AE60, #2ecc71); }
  .dim-fill.yellow { background: linear-gradient(90deg, #F39C12, #f7b731); }
  .dim-fill.red    { background: linear-gradient(90deg, #E74C3C, #ec7063); }
  .dim-detail { font-size: 12px; color: var(--text-light); margin-top: 4px; }

  /* ── Evidence table ── */
  .evidence-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .evidence-table th {
    text-align: left; padding: 10px 14px; background: #F8F9FA;
    font-size: 12px; font-weight: 600; color: var(--text-light);
    text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--border);
  }
  .evidence-table td {
    padding: 10px 14px; border-bottom: 1px solid #F0F2F5; vertical-align: top;
    font-size: 13px;
  }
  .evidence-table tr:last-child td { border-bottom: none; }
  .evidence-table td:first-child { color: var(--text-light); font-size: 12px; white-space: nowrap; }
  .tag {
    display: inline-block; padding: 2px 10px; border-radius: 10px;
    font-size: 11px; font-weight: 700; margin-right: 6px;
  }
  .tag-ok   { background: var(--green-bg); color: var(--green); }
  .tag-warn { background: var(--yellow-bg); color: #c17e0a; }
  .tag-bad  { background: var(--red-bg); color: var(--red); }

  /* ── Disclaimer ── */
  .disclaimer {
    padding: 16px 36px; font-size: 12px; color: var(--grey);
    line-height: 1.8; background: #FBFBFC; border-top: 1px solid var(--border);
  }

  /* ── Empty state ── */
  .empty-state {
    text-align: center; padding: 60px 32px; display: block;
  }
  .empty-state .shield {
    width: 80px; height: 96px; margin: 0 auto 24px;
    background: linear-gradient(180deg, #E8F0F8 0%, #D5E5F5 100%);
    border-radius: 12px 12px 20px 20px; position: relative;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
  }
  .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 6px; }
  .empty-state p  { font-size: 14px; color: var(--text-light); max-width: 340px; margin: 0 auto; }

  @media (max-width: 640px) {
    .hero { padding: 40px 20px 32px; }
    .hero h1 { font-size: 26px; }
    .stats-strip { grid-template-columns: 1fr; padding: 32px 20px 8px; }
    .search-row input { padding: 14px 16px; font-size: 15px; }
    .search-row button { padding: 14px 24px; font-size: 14px; }
    .glance { grid-template-columns: 1fr; }
    .section { padding: 20px 20px; }
    .result-area { padding: 0 16px 40px; }
  }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="brand">
    <div class="icon">安</div>
    <span class="name">安心付</span>
  </div>
  <div class="demo-tag">演示模式</div>
</div>

<!-- Hero + Search -->
<div class="hero">
  <h1>办卡前查一查，<em>安心</em>再付钱</h1>
  <p class="tagline">聚合四大公开数据源，输入商户名称即可查看预付卡风险评分</p>

  <div class="search-wrap">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="输入商户名称或统一社会信用代码" autofocus>
      <button onclick="doSearch()">查询风险</button>
    </div>
    <div class="search-hint">
      演示查询：
      <span onclick="quickSearch('111')">代号 111</span>
      <span onclick="quickSearch('222')">代号 222</span>
    </div>
  </div>
</div>

<!-- Stats strip -->
<div class="stats-strip">
  <div class="stat-card">
    <div class="num">3万+</div>
    <div class="label">2024年上海预付卡投诉量</div>
    <div class="src">来源：上海市市场监管局</div>
  </div>
  <div class="stat-card">
    <div class="num safe">47%</div>
    <div class="label">发卡商户处于高风险区间</div>
    <div class="src">未备案 + 工商异常的商户占比</div>
  </div>
  <div class="stat-card">
    <div class="num" style="background: linear-gradient(135deg, #F39C12, #E67E22); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">¥4,200</div>
    <div class="label">健身行业单笔平均损失金额</div>
    <div class="src">来源：12315消费投诉数据</div>
  </div>
</div>

<!-- Result area -->
<div class="result-area">
  <!-- Empty state -->
  <div class="result-card show" id="emptyState">
    <div class="empty-state">
      <div class="shield">🛡️</div>
      <h3>输入商户名称开始查询</h3>
      <p>系统将自动从上海市预付卡备案平台、国家企业信用信息公示系统、中国裁判文书网、12315 四个公开数据源聚合信息，生成风险评分</p>
    </div>
  </div>

  <!-- Search result -->
  <div class="result-card" id="resultCard"></div>
</div>

<script>
const RING_CIRCUMFERENCE = 2 * Math.PI * 60; // r=60

// ═══════════════════════════════════
// Demo data
// ═══════════════════════════════════
const DEMO = {
  '111': {
    name: '星恒健身工作室', type: '健身服务',
    address: '上海市嘉定区塔城路295号', credit_code: '91310114MA1G******',
    legal_person: '陈建国', established: '2017-03-15', registered_capital: '500万元',
    score: 88, grade: 'green', grade_label: '绿色 · 低风险',
    verdict: '该商户综合风险较低，可以放心办卡',
    advice: '备案齐全、经营稳定、无涉诉记录。建议保留合同与付款凭证。',
    dims: [
      { name:'合规度', score:90, weight:'×40%', detail:'已备案 · 资金存管40%（建设银行）· 信息报送正常', color:'green' },
      { name:'稳定度', score:88, weight:'×25%', detail:'成立8年+ · 社保28人 · 无异常 · 无处罚 · 法人3年无变更', color:'green' },
      { name:'纠纷度', score:95, weight:'×25%', detail:'近2年涉诉0件 · 年投诉1件（已和解）', color:'green' },
      { name:'规模可信度', score:70, weight:'×10%', detail:'注册资本500万 vs 年卡5000元，比例合理', color:'green' }
    ],
    evidence: [
      ['上海市预付卡备案平台','备案状态','ok','已备案','备案号：沪预付备2024003287号'],
      ['上海市预付卡备案平台','资金存管','ok','40%（足额）','存管银行：中国建设银行上海嘉定支行'],
      ['国家企业信用信息公示系统','成立日期','ok','2017-03-15','持续经营超过8年'],
      ['国家企业信用信息公示系统','社保人数','ok','28人','年报公示数据，与宣称规模一致'],
      ['国家企业信用信息公示系统','经营异常','ok','无',''],
      ['国家企业信用信息公示系统','行政处罚','ok','无',''],
      ['国家企业信用信息公示系统','法人变更','ok','近3年无变更',''],
      ['中国裁判文书网','涉诉记录','ok','0件','无消费合同纠纷'],
      ['12315消费投诉公示','投诉密度','ok','1.2件/年','远低于健身行业均值']
    ]
  },
  '222': {
    name: '力美健身俱乐部', type: '健身服务',
    address: '上海市嘉定区城中路78号B1层', credit_code: '91310114MA1G******',
    legal_person: '张伟（近1年第3任法人）', established: '2025-08-01', registered_capital: '10万元',
    score: 28, grade: 'red', grade_label: '红色 · 高风险',
    verdict: '该商户存在严重风险，强烈不建议办卡',
    advice: '未备案、成立不足1年、注册资本极低、法人频繁变更、多条涉诉与投诉记录叠加——跑路风险极高。',
    dims: [
      { name:'合规度', score:20, weight:'×40%', detail:'未备案 · 无资金存管 · 发卡行为已违反《上海市单用途预付消费卡管理规定》', color:'red' },
      { name:'稳定度', score:22, weight:'×25%', detail:'成立不足1年 · 社保仅2人 · 经营异常1条 · 行政处罚1条 · 1年内法人变更3次', color:'red' },
      { name:'纠纷度', score:30, weight:'×25%', detail:'近2年涉诉4件（3件退款纠纷+1件合同纠纷）· 年投诉23件', color:'red' },
      { name:'规模可信度', score:70, weight:'×10%', detail:'注册资本10万，年卡售价5888元——卖17张卡即超注册资本', color:'yellow' }
    ],
    evidence: [
      ['上海市预付卡备案平台','备案状态','bad','未备案','发卡行为已涉嫌违规'],
      ['上海市预付卡备案平台','资金存管','bad','无存管记录','预收资金无任何银行存管，可随时转移'],
      ['国家企业信用信息公示系统','成立日期','warn','2025-08-01','经营不足10个月'],
      ['国家企业信用信息公示系统','注册资本','bad','10万元','年卡5888元，卖17张即超注册资本'],
      ['国家企业信用信息公示系统','社保人数','bad','2人','宣称"20+教练"，实缴社保仅2人'],
      ['国家企业信用信息公示系统','经营异常','bad','1条','2025-12-15 通过登记住所无法联系'],
      ['国家企业信用信息公示系统','行政处罚','bad','1条','2025-11-03 因虚假宣传被处罚'],
      ['国家企业信用信息公示系统','法人变更','bad','1年3次','2025.06李→王 | 09王→赵 | 12赵→张伟'],
      ['中国裁判文书网','涉诉记录','bad','4件','3件预付卡退款纠纷（消费者胜诉）'],
      ['中国裁判文书网','执行状态','bad','2件未执行','无可执行财产，已终本'],
      ['12315消费投诉公示','年投诉量','bad','23件','投诉密度为行业均值2.7倍']
    ]
  }
};

function quickSearch(code) {
  document.getElementById('searchInput').value = code;
  doSearch();
}

function doSearch() {
  const input = document.getElementById('searchInput').value.trim();
  const empty = document.getElementById('emptyState');
  const card  = document.getElementById('resultCard');

  if (!input) {
    empty.classList.add('show'); empty.style.display = 'block';
    card.classList.remove('show');
    return;
  }

  const data = DEMO[input];
  if (!data) {
    empty.style.display = 'none'; empty.classList.remove('show');
    card.classList.add('show');
    card.innerHTML = `
      <div style="padding:56px 36px; text-align:center;">
        <div style="font-size:48px; margin-bottom:16px;">🔍</div>
        <h3 style="margin-bottom:8px; font-size:18px;">未找到 "${escapeHtml(input)}"</h3>
        <p style="color:#95A5A6; font-size:14px;">演示版暂仅包含有限商户数据，请尝试其他查询</p>
      </div>`;
    return;
  }

  empty.style.display = 'none'; empty.classList.remove('show');
  render(data);
}

function render(d) {
  const card = document.getElementById('resultCard');
  card.classList.add('show');

  const dashOffset = RING_CIRCUMFERENCE * (1 - d.score / 100);
  const ringColor = d.grade === 'green' ? '#27AE60' : d.grade === 'yellow' ? '#F39C12' : '#E74C3C';
  const scoreColor = d.grade === 'green' ? '#27AE60' : d.grade === 'yellow' ? '#c17e0a' : '#E74C3C';

  // Dim bars
  const dimsHTML = d.dims.map(dim => `
    <div class="dim-item">
      <div class="dim-head">
        <span class="dim-title">${dim.name}</span>
        <span class="dim-meta">${dim.score} 分 ${dim.weight}</span>
      </div>
      <div class="dim-track">
        <div class="dim-fill ${dim.color}" style="width:${dim.score}%"></div>
      </div>
      <div class="dim-detail">${dim.detail}</div>
    </div>`).join('');

  // Evidence rows
  const evidenceHTML = d.evidence.map(e => {
    const [source, field, tag, value, note] = e;
    const tagClass = tag === 'ok' ? 'tag-ok' : tag === 'warn' ? 'tag-warn' : 'tag-bad';
    const tagText = tag === 'ok' ? '✓' : tag === 'warn' ? '△' : '✗';
    return `<tr>
      <td>${source}</td><td>${field}</td>
      <td><span class="tag ${tagClass}">${tagText}</span> <strong>${value}</strong></td>
      <td>${note || '—'}</td>
    </tr>`;
  }).join('');

  card.innerHTML = `
    <div class="score-hero ${d.grade}">
      <div class="score-ring">
        <svg width="150" height="150" viewBox="0 0 150 150">
          <circle class="bg" cx="75" cy="75" r="60"/>
          <circle class="fill" cx="75" cy="75" r="60"
            stroke="${ringColor}"
            stroke-dasharray="${RING_CIRCUMFERENCE}"
            stroke-dashoffset="${RING_CIRCUMFERENCE}"
            id="scoreRing"/>
        </svg>
        <div class="inner">
          <span class="big" style="color:${scoreColor}">${d.score}</span>
          <span class="sub">/ 100 分</span>
        </div>
      </div>
      <div class="grade-badge ${d.grade}">${d.grade_label}</div>
      <div class="verdict" style="color:${scoreColor}">${d.verdict}</div>
      <p class="advice">${d.advice}</p>
    </div>

    <div class="glance">
      <div class="glance-item"><div class="g-label">行业</div><div class="g-value">${d.type}</div></div>
      <div class="glance-item"><div class="g-label">成立日期</div><div class="g-value">${d.established}</div></div>
      <div class="glance-item"><div class="g-label">注册资本</div><div class="g-value">${d.registered_capital}</div></div>
    </div>

    <div class="section">
      <h3>📊 风险评分拆解</h3>
      ${dimsHTML}
    </div>

    <div class="section">
      <h3>📋 风险证据链</h3>
      <div style="overflow-x:auto;">
        <table class="evidence-table">
          <thead><tr><th>数据来源</th><th>字段</th><th>结果</th><th>说明</th></tr></thead>
          <tbody>${evidenceHTML}</tbody>
        </table>
      </div>
    </div>

    <div class="disclaimer">
      <strong>⚠️ 免责声明</strong>：本查询结果仅为基于公开数据的风险参考，不构成对商户安全性的担保或法律意见。评分数据均来自法定公开平台，可独立验证。办卡请保留合同与付款凭证，遇纠纷请拨打 <strong>12315</strong>。
    </div>
  `;

  // Animate ring
  setTimeout(() => {
    const ring = document.getElementById('scoreRing');
    if (ring) ring.style.strokeDashoffset = dashOffset;
  }, 80);

  // Animate dim bars
  setTimeout(() => {
    card.querySelectorAll('.dim-fill').forEach(bar => {
      const w = bar.style.width;
      bar.style.width = '0%';
      requestAnimationFrame(() => { bar.style.width = w; });
    });
  }, 120);

  card.scrollIntoView({ behavior:'smooth', block:'start' });
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
</body>
</html>
